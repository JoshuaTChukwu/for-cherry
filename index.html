<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Loading…</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- floating hearts get injected here -->
  <div id="hearts" aria-hidden="true"></div>

  <!-- music toggle -->
  <button id="musicToggle" class="music-toggle hidden" aria-label="Toggle music">♪</button>

  <main id="stage">

    <!-- SCENE 1: opening messages -->
    <section id="scene-intro" class="scene active">
      <img id="herPhoto" class="her-photo hidden" alt="" />
      <div class="intro-lines" id="introLines"></div>
      <button id="startBtn" class="btn btn-accent hidden">Ask me</button>
    </section>

    <!-- SCENE 2: the big question -->
    <section id="scene-ask" class="scene">
      <h1 id="questionText" class="question"></h1>
      <div class="ask-buttons">
        <button id="yesBtn" class="btn btn-yes">Yes</button>
        <button id="noBtn" class="btn btn-no">No</button>
      </div>
    </section>

    <!-- SCENE 3: pick a day -->
    <section id="scene-pick" class="scene">
      <h1 id="yesTitle" class="yes-title"></h1>
      <p id="yesMessage" class="yes-message"></p>
      <div id="dateOptions" class="date-options"></div>
    </section>

    <!-- SCENE 4: the reveal (flight ticket + plan) -->
    <section id="scene-yes" class="scene">
      <div id="flightCard" class="flight-card"></div>
      <div id="datePlan" class="date-card"></div>
      <p id="closing" class="closing"></p>
      <a id="rsvpBtn" class="btn btn-accent hidden" target="_blank" rel="noopener"></a>
    </section>

  </main>

  <canvas id="confetti" aria-hidden="true"></canvas>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
